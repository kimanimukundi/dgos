# render.yaml — Render.com deployment configuration for DGOS
# Deploy this repository to Render and it will create all three services automatically

services:
  # Node.js API server
  - type: web
    name: dgos-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_HOST
        fromDatabase:
          name: dgos-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: dgos-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: dgos-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: dgos-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: dgos-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: /tmp/uploads

  # React frontend as a static site
  - type: web
    name: dgos-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: dgos-server
          type: web
          property: host

databases:
  - name: dgos-db
    plan: free
